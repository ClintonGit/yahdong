<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- rounded dark background -->
  <rect width="32" height="32" rx="8" fill="#1E2432"/>

  <!-- column track backgrounds -->
  <rect x="3.5" y="9"  width="7" height="15" rx="2" fill="#E8A030" opacity="0.15"/>
  <rect x="12.5" y="9" width="7" height="15" rx="2" fill="#4A7C5E" opacity="0.15"/>
  <rect x="21.5" y="9" width="7" height="15" rx="2" fill="#C8956A" opacity="0.15"/>

  <!-- column header dots -->
  <circle cx="7"  cy="6.5" r="1.8" fill="#E8A030"/>
  <circle cx="16" cy="6.5" r="1.8" fill="#4A7C5E"/>
  <circle cx="25" cy="6.5" r="1.8" fill="#C8956A"/>

  <!-- amber column — 3 cards -->
  <rect x="4.5" y="11"   width="5" height="2.5" rx="1.2" fill="#E8A030"/>
  <rect x="4.5" y="15"   width="5" height="2.5" rx="1.2" fill="#E8A030" opacity="0.65"/>
  <rect x="4.5" y="19"   width="3" height="2.5" rx="1.2" fill="#E8A030" opacity="0.3"/>

  <!-- green column — 2 cards -->
  <rect x="13.5" y="11"  width="5" height="2.5" rx="1.2" fill="#4A7C5E"/>
  <rect x="13.5" y="15"  width="3.5" height="2.5" rx="1.2" fill="#4A7C5E" opacity="0.6"/>

  <!-- brown column — 2 cards -->
  <rect x="22.5" y="11"  width="5" height="2.5" rx="1.2" fill="#C8956A"/>
  <rect x="22.5" y="15"  width="5" height="2.5" rx="1.2" fill="#C8956A" opacity="0.65"/>
</svg>
