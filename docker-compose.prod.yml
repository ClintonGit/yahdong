services:
  api:
    image: ghcr.io/clintonmsk/yahdong-api:latest
    env_file: .env
    restart: unless-stopped
    expose:
      - "3001"
    networks:
      - internal

  webapp:
    image: ghcr.io/clintonmsk/yahdong-webapp:latest
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - webapp
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
