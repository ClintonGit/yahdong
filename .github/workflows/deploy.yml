name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: yahdong-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/yahdong-api:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/yahdong-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push webapp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: yahdong-webapp/Dockerfile
          push: true
          build-args: VITE_API_URL=https://yahdong-api.commsk.dev
          tags: |
            ghcr.io/${{ env.OWNER }}/yahdong-webapp:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/yahdong-webapp:latest
          cache-from: type=gha,scope=webapp
          cache-to: type=gha,mode=max,scope=webapp

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/yahdong

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml exec -T api prisma migrate deploy
            docker image prune -f

            echo "Deployed ${{ github.sha }}"
