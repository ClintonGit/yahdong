name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: yahdong-api/Dockerfile
          push: true
          tags: |
            ghcr.io/clintongit/yahdong-api:${{ github.sha }}
            ghcr.io/clintongit/yahdong-api:latest

      - name: Build & push webapp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: yahdong-webapp/Dockerfile
          push: true
          build-args: VITE_API_URL=https://yahdong-api.commsk.dev
          tags: |
            ghcr.io/clintongit/yahdong-webapp:${{ github.sha }}
            ghcr.io/clintongit/yahdong-webapp:latest

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build-and-push
    environment: production
    steps:
      - name: Pull & restart containers
        run: |
          cd ~/yahdong
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          docker compose -f docker-compose.prod.yml exec -T api prisma migrate deploy
          docker image prune -f
