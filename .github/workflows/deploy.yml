name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        run: |
          git config --global --add safe.directory '*'
          [ -d .git ] && chmod -R a+rwX .git || true
          if [ -d .git ]; then
            git fetch origin
            git reset --hard ${{ github.sha }}
          else
            git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push API image
        run: |
          docker build \
            -f yahdong-api/Dockerfile \
            -t ghcr.io/clintongit/yahdong-api:${{ github.sha }} \
            -t ghcr.io/clintongit/yahdong-api:latest \
            .
          docker push ghcr.io/clintongit/yahdong-api:${{ github.sha }}
          docker push ghcr.io/clintongit/yahdong-api:latest

      - name: Build & push webapp image
        run: |
          docker build \
            --build-arg VITE_API_URL=https://yahdong-api.commsk.dev \
            -f yahdong-webapp/Dockerfile \
            -t ghcr.io/clintongit/yahdong-webapp:${{ github.sha }} \
            -t ghcr.io/clintongit/yahdong-webapp:latest \
            .
          docker push ghcr.io/clintongit/yahdong-webapp:${{ github.sha }}
          docker push ghcr.io/clintongit/yahdong-webapp:latest

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build-and-push
    environment: production
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull & restart containers
        run: |
          cd ~/yahdong
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          docker compose -f docker-compose.prod.yml exec -T api prisma migrate deploy
          docker image prune -f
