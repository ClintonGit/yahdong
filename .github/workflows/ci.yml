name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Check
    runs-on: self-hosted
    container:
      image: node:20-alpine
    steps:
      - name: Checkout
        run: |
          apk add --no-cache git
          git config --global --add safe.directory /__w/yahdong/yahdong
          if [ -d .git ]; then
            git fetch origin
            git reset --hard ${{ github.sha }}
            git clean -fdx
          else
            git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          fi

      - name: Install deps
        run: npm ci

      - name: Fix native modules for musl/Alpine
        run: cd yahdong-webapp && npm rebuild @tailwindcss/oxide --update-binary

      - name: Generate Prisma client
        run: cd yahdong-api && npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci

      - name: Build API
        run: npm run build:api

      - name: Build webapp
        run: npm run build:web
        env:
          VITE_API_URL: https://yahdong-api.commsk.dev
