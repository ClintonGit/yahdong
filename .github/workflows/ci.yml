name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Fix rolldown optional native binding (npm workspace bug)
        working-directory: yahdong-webapp
        run: npm install --include=optional

      - name: Generate Prisma client
        run: cd yahdong-api && npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci

      - run: npm run build:api

      - name: Build webapp
        run: npm run build:web
        env:
          VITE_API_URL: https://yahdong-api.commsk.dev
