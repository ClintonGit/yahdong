name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Check
    runs-on: self-hosted
    steps:
      - name: Checkout
        run: |
          if [ -d .git ]; then
            git fetch origin
            git reset --hard ${{ github.sha }}
            git clean -fdx
          else
            git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          fi

      - name: Install deps (no lockfile — mirrors Dockerfile for cross-platform optional deps)
        run: rm -f package-lock.json && npm install

      - name: Generate Prisma client
        run: cd yahdong-api && npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci

      - name: Build API
        run: npm run build:api

      - name: Build webapp
        run: npm run build:web
        env:
          VITE_API_URL: https://yahdong-api.commsk.dev
